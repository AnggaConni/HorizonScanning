<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Publications | Horizon Scan AI</title>
    <meta name="description" content="Read articles, case studies, and methodologies on Strategic Foresight and Horizon Scanning.">
    
    <!-- Tailwind CSS & Typography -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        navy: { 800: '#1e293b', 900: '#0f172a', 950: '#020617' },
                        teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased selection:bg-teal-200 selection:text-teal-900 flex flex-col min-h-screen">

    <!-- Navigation (Modified links to point back to index.html) -->
    <nav class="fixed w-full z-50 glass-nav transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex-shrink-0 flex items-center gap-2 cursor-pointer">
                    <i class="ph ph-radar text-teal-600 text-3xl"></i>
                    <span class="font-bold text-xl text-navy-900 tracking-tight">HorizonScan<span class="text-teal-600">AI</span></span>
                </a>
                
                <div class="hidden md:flex space-x-6 items-center">
                    <a href="index.html#about" class="text-slate-600 hover:text-teal-600 text-sm font-medium transition-colors">About</a>
                    <a href="index.html#features" class="text-slate-600 hover:text-teal-600 text-sm font-medium transition-colors">Features</a>
                    <a href="index.html#guide" class="text-slate-600 hover:text-teal-600 text-sm font-medium transition-colors">Masterclass</a>
                    
                    <!-- Active State for Articles -->
                    <a href="blog.html" class="inline-flex items-center text-teal-600 bg-teal-50 text-sm font-bold transition-all px-3 py-2 rounded-lg">
                        <i class="ph-fill ph-newspaper mr-1.5 text-lg"></i> Articles
                    </a>

                    <a href="tool.html" class="inline-flex items-center justify-center px-5 py-2.5 border border-transparent text-sm font-bold rounded-lg text-white bg-navy-900 hover:bg-teal-600 shadow-sm transition-all duration-300 transform hover:-translate-y-0.5">
                        <i class="ph ph-rocket-launch mr-2 text-lg"></i> Open Tool
                    </a>
                </div>
                
                <!-- Mobile Menu Button -->
                <div class="md:hidden flex items-center gap-2">
                    <a href="blog.html" class="px-3 py-2 text-xs font-bold rounded-lg text-teal-700 bg-teal-50 border border-teal-200">Blog</a>
                    <a href="tool.html" class="px-3 py-2 text-xs font-bold rounded-lg text-white bg-teal-600 shadow-sm">Open Tool</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow pt-24 pb-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" id="app-container">
            <!-- Loading Indicator -->
            <div id="loading-state" class="flex flex-col items-center justify-center py-20">
                <i class="ph ph-spinner-gap text-4xl text-teal-600 animate-spin mb-4"></i>
                <p class="text-slate-500 font-medium">Loading publications...</p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-navy-950 text-slate-400 py-12 border-t border-slate-900 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <i class="ph ph-radar text-teal-600 text-3xl mb-4"></i>
            <p class="text-sm max-w-md mx-auto mb-6">Transforming scattered data points into actionable strategic insights.</p>
            <div class="text-xs text-slate-500">
                <p>Version 1.2 | Strategic Foresight Platform</p>
            </div>
        </div>
    </footer>

    <!-- Logic to Fetch and Render JSON -->
    <script>
        const appContainer = document.getElementById('app-container');
        const loadingState = document.getElementById('loading-state');

        // Fetch Data from JSON
        async function fetchArticles() {
            try {
                // If running locally without a server, fetch might fail due to CORS.
                const response = await fetch('blog/data.json');
                if (!response.ok) throw new Error('Network response was not ok');
                const articles = await response.json();
                
                // Route checking based on URL parameter (?id=1)
                const urlParams = new URLSearchParams(window.location.search);
                const articleId = urlParams.get('id');

                if (articleId) {
                    const article = articles.find(a => a.id === articleId);
                    if (article) {
                        renderSingleArticle(article);
                    } else {
                        renderError("Article not found.");
                    }
                } else {
                    renderArticleList(articles);
                }
            } catch (error) {
                console.error("Error loading articles:", error);
                renderError("Unable to load articles. Make sure you are viewing this via a local web server (like VS Code Live Server) so the JSON file can be fetched.");
            }
        }

        // Render List of Articles (Grid)
        function renderArticleList(articles) {
            let html = `
                <div class="text-center mb-16 mt-8">
                    <h1 class="text-4xl md:text-5xl font-extrabold text-navy-900 mb-4 tracking-tight">Strategic Insights</h1>
                    <p class="text-lg text-slate-500 max-w-2xl mx-auto">Publications, methodologies, and case studies on navigating uncertainty and mastering horizon scanning.</p>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            `;

            articles.forEach(article => {
                html += `
                    <article class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm hover:shadow-lg transition-all duration-300 flex flex-col transform hover:-translate-y-1">
                        <div class="h-48 bg-slate-200 relative overflow-hidden">
                            <img src="${article.imageUrl}" alt="${article.title}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23f1f5f9%22/><text x=%2250%22 y=%2250%22 font-family=%22sans-serif%22 font-size=%2210%22 text-anchor=%22middle%22 fill=%22%2394a3b8%22>No Image</text></svg>'">
                            <div class="absolute top-4 left-4 bg-teal-500/90 backdrop-blur text-white text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">
                                ${article.category}
                            </div>
                        </div>
                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex items-center gap-2 text-xs text-slate-400 font-medium mb-3">
                                <i class="ph ph-calendar-blank"></i> ${article.date}
                            </div>
                            <h2 class="text-xl font-bold text-navy-900 mb-3 leading-snug line-clamp-2 hover:text-teal-600 transition-colors">
                                <a href="?id=${article.id}">${article.title}</a>
                            </h2>
                            <p class="text-slate-600 text-sm mb-6 flex-grow line-clamp-3">${article.excerpt}</p>
                            <a href="?id=${article.id}" class="inline-flex items-center font-bold text-teal-600 hover:text-navy-900 transition-colors mt-auto">
                                Read Article <i class="ph-bold ph-arrow-right ml-2"></i>
                            </a>
                        </div>
                    </article>
                `;
            });

            html += `</div>`;
            appContainer.innerHTML = html;
        }

        // Render Single Article Detail
        function renderSingleArticle(article) {
            const html = `
                <div class="max-w-3xl mx-auto mt-8">
                    <!-- Back Button -->
                    <a href="blog.html" class="inline-flex items-center text-sm font-semibold text-slate-500 hover:text-teal-600 mb-8 transition-colors">
                        <i class="ph-bold ph-arrow-left mr-2"></i> Back to all articles
                    </a>
                    
                    <!-- Article Header -->
                    <header class="mb-10 text-center">
                        <div class="inline-block bg-teal-50 text-teal-700 font-bold text-xs px-3 py-1 rounded-full uppercase tracking-widest mb-4 border border-teal-100">
                            ${article.category}
                        </div>
                        <h1 class="text-3xl md:text-5xl font-extrabold text-navy-900 mb-6 leading-tight">${article.title}</h1>
                        <div class="flex items-center justify-center gap-4 text-sm text-slate-500 font-medium">
                            <span class="flex items-center gap-1.5"><i class="ph-fill ph-user-circle text-lg"></i> ${article.author}</span>
                            <span>•</span>
                            <span class="flex items-center gap-1.5"><i class="ph-fill ph-calendar-blank text-lg"></i> ${article.date}</span>
                        </div>
                    </header>

                    <!-- Featured Image -->
                    <div class="w-full h-64 md:h-96 bg-slate-200 rounded-2xl overflow-hidden mb-12 shadow-md">
                        <img src="${article.imageUrl}" alt="${article.title}" class="w-full h-full object-cover" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23f1f5f9%22/></svg>'">
                    </div>

                    <!-- Article Body (Tailwind Typography plugin handles the styling) -->
                    <article class="prose prose-slate prose-lg max-w-none prose-headings:text-navy-900 prose-a:text-teal-600 hover:prose-a:text-teal-500">
                        ${article.content}
                    </article>

                    <!-- Article Footer -->
                    <div class="mt-16 pt-8 border-t border-slate-200 text-center">
                        <h4 class="font-bold text-navy-900 mb-4">Share this article</h4>
                        <div class="flex justify-center gap-4">
                            <button onclick="navigator.clipboard.writeText(window.location.href); alert('Link copied to clipboard!');" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-teal-500 hover:text-white transition-colors">
                                <i class="ph-fill ph-link text-xl"></i>
                            </button>
                            <a href="https://www.linkedin.com/sharing/share-offsite/?url=" target="_blank" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-[#0a66c2] hover:text-white transition-colors">
                                <i class="ph-fill ph-linkedin-logo text-xl"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            appContainer.innerHTML = html;
        }

        // Render Error State
        function renderError(message) {
            appContainer.innerHTML = `
                <div class="text-center py-20 max-w-lg mx-auto">
                    <i class="ph-fill ph-warning-circle text-5xl text-red-400 mb-4"></i>
                    <h2 class="text-2xl font-bold text-navy-900 mb-2">Oops! Something went wrong</h2>
                    <p class="text-slate-600">${message}</p>
                    <a href="blog.html" class="inline-block mt-6 px-6 py-2 bg-navy-900 text-white rounded-lg font-bold">Return to Blog</a>
                </div>
            `;
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', fetchArticles);
    </script>
</body>
</html>
