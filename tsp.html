    function ScenariosTab() {

        if (!scanning) return;
        if (vis >= sc.signals.length) { setScanning(false); return; }
        const t = setTimeout(() => setVis(v => v+1), 720);
        return () => clearTimeout(t);

            </div>
          )}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{sc.stats.map((st, i) => (<div key={i} className="bg-white border border-slate-200 rounded-2xl p-4"><div className="flex items-center gap-2 mb-2"><st.Icon size={14} className="text-slate-400"/><p className="text-xs text-slate-500 font-medium">{st.label}</p></div><p className="text-2xl font-extrabold text-slate-900 font-mono leading-none">{st.value}</p><p className="text-xs text-slate-400 mt-1">{st.sub}</p></div>))}</div>
          <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden"><div className="flex items-center justify-between px-5 py-4 border-b border-slate-100"><div className="flex items-center gap-2.5"><div className="w-7 h-7 bg-indigo-100 rounded-lg flex items-center justify-center"><Radio size={14} className="text-indigo-600"/></div><div><p className="text-sm font-bold text-slate-900">Horizon Scan Feed</p><p className="text-xs text-slate-400">Weak signal intelligence — {sc.signals.length} signals detected</p></div></div><button onClick={runScan} disabled={scanning} className="flex items-center gap-2 px-4 py-2 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 text-white text-xs font-bold rounded-xl transition-all">{scanning ? <RefreshCw size={13} className="animate-spin"/> : <Zap size={13}/>}{scanning ? "Scanning..." : "Run Scan"}</button></div><div className="p-4 space-y-2.5">{vis === 0 && !scanning && (<div className="text-center py-8 text-slate-400"><Radio size={28} className="mx-auto mb-2 opacity-30"/><p className="text-sm">Press Run Scan to simulate signal detection</p></div>)}{sc.signals.slice(0, vis).map((sig, i) => { const cls = SIG_CLS[sig.level]; return (<div key={`${idx}-${i}`} className={`sig-in flex items-start gap-3 p-3 rounded-xl ${cls.wrap}`}><div className={`w-2 h-2 rounded-full mt-1.5 shrink-0 pulse-dot ${cls.dot}`}/><div className="flex-1 min-w-0"><div className="flex items-center gap-2 flex-wrap mb-1"><span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${cls.badge}`}>{sig.level.toUpperCase()}</span><span className="text-xs font-bold text-slate-700">{sig.source}</span></div><p className="text-xs text-slate-600 leading-relaxed">{sig.text}</p></div><ChevronRight size={13} className="text-slate-300 shrink-0 mt-1"/></div>); })}{scanning && vis < sc.signals.length && (<div className="flex items-center gap-2 px-3 py-2 text-xs text-indigo-600 font-medium"><div className="w-2 h-2 bg-indigo-500 rounded-full pulse-dot"/>Scanning signal sources...</div>)}</div></div>
        </div>
      );
    }
    function RoutePanel({ route, label, isWinner, maxL }) { const tot = totalL(route.latency); const activeVars = VAR_META.filter(v => (route.latency[v.key]||0) > 0); return (<div className={`bg-white border-2 rounded-2xl overflow-hidden ${isWinner ? "border-emerald-400" : "border-slate-200"}`}><div className={`px-5 py-3 flex items-center justify-between ${isWinner ? "bg-emerald-50" : "bg-rose-50"}`}><div><p className="text-xs font-bold text-slate-500 uppercase tracking-wider">{label}</p><p className="text-sm font-bold text-slate-800 mt-0.5">{route.label}</p></div><div className="text-right"><p className={`text-3xl font-extrabold font-mono ${isWinner ? "text-emerald-600" : "text-rose-600"}`}>{tot}</p><p className="text-xs text-slate-400">day-equiv.</p></div></div><div className="p-5 space-y-4"><div className="h-8 w-full bg-slate-100 rounded-xl overflow-hidden flex border border-slate-200">{VAR_META.map(v => { const val = route.latency[v.key]||0; if (!val) return null; const pct = (val / maxL) * 100; return (<div key={v.key} style={{width:`${pct}%`}} title={`${v.name}: ${val}d`} className={`${v.bar} hover:brightness-110 transition-all cursor-pointer relative flex items-center justify-center`}>{pct > 8 && <span className="text-white text-[10px] font-bold">{val}</span>}</div>); })}</div><div className="space-y-1.5">{activeVars.map(v => { const val = route.latency[v.key]||0; return (<div key={v.key} className="flex items-center gap-2 text-xs"><div className={`w-2 h-2 rounded-sm shrink-0 ${v.bar}`}/><span className="text-slate-500 w-24 shrink-0">[{v.short}] {v.name}</span><div className="flex-1 h-1.5 bg-slate-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${v.bar}`} style={{width:`${(val/tot)*100}%`}}/></div><span className="font-mono font-bold text-slate-700 w-6 text-right">{val}d</span></div>); })}</div><p className="text-xs text-slate-400 italic border-t border-slate-100 pt-3">{route.note}</p><div className={`flex items-center gap-2 text-xs font-bold px-3 py-2 rounded-xl ${isWinner ? "bg-emerald-50 text-emerald-700" : "bg-slate-50 text-slate-500"}`}><span className="text-[10px] font-bold px-2 py-0.5 rounded-full border" style={{borderColor: isWinner?"#34d399":"#e2e8f0"}}>{route.badge}</span></div></div></div>); }
    function SimulationTab() { const [rA, setRA] = useState({ d:3, t:7, i:5, b:30, r:0 }); const [rB, setRB] = useState({ d:5, t:1, i:1, b:2,  r:0 }); const tA = totalL(rA), tB = totalL(rB); const maxT = Math.max(tA, tB, 1); const saved = tA - tB; const upA = (k,v) => setRA(p=>({...p,[k]:parseInt(v)||0})); const upB = (k,v) => setRB(p=>({...p,[k]:parseInt(v)||0})); return (<div className="space-y-5"><div className="bg-indigo-600 rounded-2xl p-5 flex flex-col md:flex-row items-start md:items-center justify-between gap-4"><div><p className="text-indigo-200 text-xs font-bold uppercase tracking-widest mb-1">Frictional Latency Equation</p><p className="text-white font-mono text-2xl font-extrabold tracking-wider">L(x) = D + T + I + B + R</p><p className="text-indigo-300 text-xs mt-1.5 leading-relaxed">Adjust any variable below. Route B wins when its total L(x) is lower — even if D is higher.</p></div><div className="shrink-0 bg-indigo-700 rounded-xl p-4 text-center"><p className="text-indigo-200 text-xs mb-1">Day-Equiv. Saved</p><p className={`text-3xl font-extrabold font-mono ${saved>0?"text-emerald-300":saved<0?"text-rose-300":"text-white"}`}>{saved>0?"+":""}{saved}</p><p className="text-indigo-300 text-xs mt-0.5">{saved>0?"Route B wins":saved<0?"Route A wins":"Tied"}</p></div></div><div className="bg-white border border-slate-200 rounded-2xl p-5"><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Abstract Route Map</p><RouteMapSVG tA={tA} tB={tB} latA={rA} latB={rB} /></div><div className="grid grid-cols-1 lg:grid-cols-2 gap-5"><SimPanel label="Route A" emoji="⚠️" total={tA} maxT={maxT} lat={rA} updater={upA} isWinner={tA<tB} /><SimPanel label="Route B" emoji="✓" total={tB} maxT={maxT} lat={rB} updater={upB} isWinner={tB<tA} /></div><div className="flex flex-wrap gap-4 justify-center text-xs text-slate-600 py-2">{VAR_META.map(v => (<div key={v.key} className="flex items-center gap-1.5"><div className={`w-3 h-3 rounded-sm ${v.bar}`}/><span>[{v.short}] {v.name}</span></div>))}</div></div>); }
    function RouteMapSVG({ tA, tB, latA, latB }) { const maxAll = Math.max(tA, tB, 1); const wA = Math.round((tA / maxAll) * 420); const wB = Math.round((tB / maxAll) * 420); return (<svg viewBox="0 0 620 140" className="w-full h-auto"><text x="10" y="32" fontSize="11" fontWeight="700" fill="#64748b">ORIGIN</text><text x="560" y="32" fontSize="11" fontWeight="700" fill="#64748b" textAnchor="end">DESTINATION</text><rect x="10" y="42" width="540" height="24" rx="12" fill="#f1f5f9"/><rect x="10" y="42" width={wA} height="24" rx="12" fill="#e11d48" opacity="0.15"/>{VAR_META.filter(v=>latA[v.key]>0).reduce((acc,v,i,arr)=>{ const pct = (arr.slice(0,i).reduce((s,x)=>s+(latA[x.key]||0),0) / Math.max(tA,1)); const w = (latA[v.key]||0) / Math.max(tA,1) * wA; const x = 10 + pct * wA; acc.push(<rect key={v.key} x={x} y={42} width={w} height={24} fill={v.hex} opacity="0.9"/>); return acc; },[])}<text x="16" y="57" fontSize="10" fontWeight="700" fill="#334155">Route A  L(x)={tA}d</text><text x={10+wA+6} y="57" fontSize="11" fontWeight="700" fill="#e11d48">{tA}d</text><rect x="10" y="96" width="540" height="24" rx="12" fill="#f1f5f9"/><rect x="10" y="96" width={wB} height="24" rx="12" fill="#10b981" opacity="0.15"/>{VAR_META.filter(v=>latB[v.key]>0).reduce((acc,v,i,arr)=>{ const pct = arr.slice(0,i).reduce((s,x)=>s+(latB[x.key]||0),0) / Math.max(tB,1); const w = (latB[v.key]||0) / Math.max(tB,1) * wB; const x = 10 + pct * wB; acc.push(<rect key={v.key} x={x} y={96} width={w} height={24} fill={v.hex} opacity="0.9"/>); return acc; },[])}<text x="16" y="111" fontSize="10" fontWeight="700" fill="#334155">Route B  L(x)={tB}d</text><text x={10+wB+6} y="111" fontSize="11" fontWeight="700" fill="#10b981">{tB}d</text></svg>); }
    function SimPanel({ label, emoji, total, maxT, lat, updater, isWinner }) { return (<div className={`bg-white border-2 rounded-2xl overflow-hidden ${isWinner?"border-emerald-400":"border-slate-200"}`}><div className={`px-5 py-3 flex items-center justify-between ${isWinner?"bg-emerald-50":"bg-slate-50"}`}><div><p className="text-xs font-bold text-slate-500">{emoji} {label}</p><p className={`text-3xl font-extrabold font-mono ${isWinner?"text-emerald-600":"text-rose-600"}`}>{total} <span className="text-sm font-medium text-slate-400">days</span></p></div>{isWinner && (<div className="flex items-center gap-1.5 text-xs font-bold text-emerald-700 bg-emerald-100 px-3 py-1.5 rounded-full"><CheckCircle size={12}/> OPTIMAL</div>)}</div><div className="px-5 pt-4 pb-2"><div className="h-10 w-full bg-slate-100 rounded-xl overflow-hidden flex border border-slate-200">{VAR_META.map(v => { const val = lat[v.key]||0; if (!val) return null; const pct = (val/Math.max(maxT,1))*100; return (<div key={v.key} style={{width:`${pct}%`}} title={`${v.name}: ${val}d`} className={`${v.bar} flex items-center justify-center border-r border-white/20 last:border-0 transition-all hover:brightness-110 cursor-default`}>{pct > 6 && <span className="text-white text-[10px] font-bold leading-none">{val}</span>}</div>); })}</div></div><div className="px-5 pb-5 pt-3 space-y-4">{VAR_META.map(v => (<div key={v.key} className="space-y-1.5"><div className="flex justify-between text-xs font-semibold text-slate-600"><span className={v.text}>[{v.short}] {v.name}</span><span className="font-mono bg-slate-100 px-2 py-0.5 rounded border border-slate-200 text-slate-700">{lat[v.key]||0}d</span></div><input type="range" min="0" max={v.max} value={lat[v.key]||0} onChange={e=>updater(v.key,e.target.value)} className="w-full h-1.5 bg-slate-200 rounded-full appearance-none cursor-pointer"/></div>))}</div></div>); }
    function CalculatorTab() { const [params, setParams] = useState({ distanceDays:4, trafficProb:40, trafficMax:5, infraProb:15, infraMax:7, bStops:3, delayPerStop:2.5, riskProb:0, riskImpact:0, dailyCost:150, }); const set = (k,v) => setParams(p=>({...p,[k]:parseFloat(v)||0})); const expT = (params.trafficProb/100)*params.trafficMax; const expI = (params.infraProb/100)*params.infraMax; const expB = params.bStops * params.delayPerStop; const expR = (params.riskProb/100)*params.riskImpact; const expL = params.distanceDays + expT + expI + expB + expR; const expCost = expL * params.dailyCost; const loadPreset = (sc) => { const A = sc.routeA.latency; setParams(p=>({ ...p, distanceDays: A.d||0, trafficProb: A.t > 0 ? 80 : 0, trafficMax: A.t||0, infraProb: A.i > 0 ? 60 : 0, infraMax: A.i||0, bStops: Math.round((A.b||0)/3)||1, delayPerStop: A.b > 0 ? 3 : 0, riskProb: A.r > 0 ? 30 : 0, riskImpact: A.r > 0 ? Math.round(A.r/0.3) : 0, })); }; return (<div className="space-y-5"><div className="bg-white border border-slate-200 rounded-2xl p-4"><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">Quick Load — Route A from Real Scenario</p><div className="flex flex-wrap gap-2">{SCENARIOS.map(sc => (<button key={sc.id} onClick={() => loadPreset(sc)} className={`px-3 py-1.5 rounded-lg text-xs font-bold transition-all border ${sc.chipClass} hover:opacity-80 border-transparent`}>{sc.title.split("/")[0].trim()}</button>))}<button onClick={() => setParams({ distanceDays:4,trafficProb:40,trafficMax:5,infraProb:15,infraMax:7,bStops:3,delayPerStop:2.5,riskProb:0,riskImpact:0,dailyCost:150 })} className="px-3 py-1.5 rounded-lg text-xs font-bold bg-slate-100 text-slate-600 hover:bg-slate-200 transition-all flex items-center gap-1.5"><RefreshCw size={11}/> Reset</button></div></div><div className="grid grid-cols-1 lg:grid-cols-3 gap-5"><div className="lg:col-span-2 bg-white border border-slate-200 rounded-2xl p-6 space-y-6"><div><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4 flex items-center gap-2"><Map size={12}/>Base Metrics</p><div className="grid grid-cols-1 md:grid-cols-2 gap-4"><CalcInput label="Base Transit Time (days)" name="distanceDays" value={params.distanceDays} onChange={set} hint="Ideal travel time with zero disruptions"/><CalcInput label="Holding Cost per Day ($)" name="dailyCost" value={params.dailyCost} onChange={set} hint="Fuel, storage, delay penalties, etc."/></div></div><div className="grid grid-cols-1 md:grid-cols-2 gap-6"><div className="space-y-4"><p className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2"><Truck size={12}/>Traffic Variables</p><CalcInput label="Traffic Delay Probability (%)" name="trafficProb" value={params.trafficProb} max={100} onChange={set} hint="Probability (0–100) of severe congestion"/><CalcInput label="Max Expected Traffic Delay (d)" name="trafficMax" value={params.trafficMax} onChange={set} hint="Worst-case days if congestion occurs"/><p className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 pt-2"><AlertTriangle size={12}/>Infrastructure Risk</p><CalcInput label="Infrastructure Failure Prob. (%)" name="infraProb" value={params.infraProb} max={100} onChange={set} hint="Probability of road damage or port issues"/><CalcInput label="Max Recovery Delay (days)" name="infraMax" value={params.infraMax} onChange={set} hint="Days needed to bypass broken infrastructure"/></div><div className="space-y-4"><p className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2"><FileText size={12}/>Bureaucratic Friction</p><CalcInput label="Number of Checkpoints" name="bStops" value={params.bStops} onChange={set} hint="Manual inspections, customs stops, etc."/><CalcInput label="Average Delay per Stop (d)" name="delayPerStop" value={params.delayPerStop} step="0.5" onChange={set} hint="Average days spent at each checkpoint"/><p className="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2 pt-2"><Shield size={12}/>Risk Exposure (R)</p><CalcInput label="Disruption Probability (%)" name="riskProb" value={params.riskProb} max={100} onChange={set} hint="Attack, closure, seizure probability"/><CalcInput label="Impact if Event Occurs (d)" name="riskImpact" value={params.riskImpact} onChange={set} hint="Expected days of delay if risk materializes"/></div></div></div><div className="space-y-4"><div className="bg-indigo-600 rounded-2xl p-6 text-white relative overflow-hidden"><div className="absolute -top-4 -right-4 opacity-10"><Activity size={100}/></div><p className="text-indigo-200 text-xs font-bold uppercase tracking-widest mb-1 relative z-10">Expected L(x)</p><p className="text-indigo-300 text-xs mb-4 relative z-10">Bayesian weighted projection</p><p className="text-6xl font-extrabold font-mono relative z-10">{expL.toFixed(1)}</p><p className="text-indigo-200 text-sm mt-1 relative z-10">day-equivalents</p></div><div className="bg-white border border-slate-200 rounded-2xl p-5"><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Latency Breakdown</p><DonutChart segments={[{ label:"Distance", value: params.distanceDays, color:"#3b82f6" },{ label:"Traffic", value: expT, color:"#f59e0b" },{ label:"Infra", value: expI, color:"#f97316" },{ label:"Bureaucracy", value: expB, color:"#a855f7" },{ label:"Risk", value: expR, color:"#e11d48" }].filter(s=>s.value>0)} total={expL} /></div><div className="bg-white border border-slate-200 rounded-2xl p-5"><p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-1">Projected Logistics Cost</p><p className="text-3xl font-extrabold font-mono text-emerald-600">${expCost.toLocaleString(undefined,{minimumFractionDigits:0,maximumFractionDigits:0})}</p><p className="text-xs text-slate-400 mt-1">{expL.toFixed(1)}d × ${params.dailyCost}/d</p></div></div></div></div>); }
    function CalcInput({ label, name, value, onChange, hint, max, step="1" }) { return (<div><label className="block text-xs font-semibold text-slate-700 mb-0.5">{label}</label>{hint && <p className="text-[10px] text-slate-400 mb-1.5 leading-tight">{hint}</p>}<input type="number" name={name} value={value} onChange={e=>onChange(name,e.target.value)} max={max} step={step} className="w-full border border-slate-300 text-slate-800 text-sm font-medium rounded-xl focus:ring-2 focus:ring-indigo-400/30 focus:border-indigo-500 p-2.5 outline-none transition-all bg-white"/></div>); }
    function DonutChart({ segments, total }) { if (!segments.length || total <= 0) return null; const r = 44, cx = 56, cy = 56, stroke = 16; const circ = 2 * Math.PI * r; let offset = -Math.PI / 2; const paths = segments.map(s => { const pct = s.value / total; const angle = pct * Math.PI * 2; const start = offset; offset += angle; const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start); const x2 = cx + r * Math.cos(start+angle), y2 = cy + r * Math.sin(start+angle); const large = angle > Math.PI ? 1 : 0; return { ...s, pct, d: `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}` }; }); return (<div className="flex items-center gap-4"><svg width="112" height="112" viewBox="0 0 112 112" className="shrink-0"><circle cx={cx} cy={cy} r={r} fill="none" stroke="#f1f5f9" strokeWidth={stroke}/>{paths.map((p,i) => (<path key={i} d={p.d} fill="none" stroke={p.color} strokeWidth={stroke} strokeLinecap="round"/>))}<text x={cx} y={cy-3} textAnchor="middle" fontSize="13" fontWeight="700" fill="#1e293b">{total.toFixed(1)}</text><text x={cx} y={cy+11} textAnchor="middle" fontSize="9" fill="#94a3b8">days</text></svg><div className="space-y-2 flex-1">{paths.map((s,i) => (<div key={i}><div className="flex justify-between text-xs mb-1"><span className="text-slate-600 flex items-center gap-1.5"><span style={{background:s.color}} className="w-2 h-2 rounded-sm inline-block"/>{s.label}</span><span className="font-mono font-bold text-slate-700">{s.value.toFixed(1)}d</span></div><div className="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden"><div style={{width:`${s.pct*100}%`,background:s.color}} className="h-full rounded-full"/></div></div>))}</div></div>); }

    // Render app
    const rootElement = document.getElementById("root");
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
