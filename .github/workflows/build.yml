name: Build Blog

on:
  push:
    paths:
      - 'blog/data.json'
      - 'scripts/generate-blog.js'

# PENTING: Baris ini wajib agar bot diizinkan menyimpan file ke repo kamu
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Run generator
        run: node scripts/generate-blog.js

      - name: Commit generated HTML
              run: |
                # 1. Debugging: Tampilkan isi folder untuk memastikan file ter-generate
                echo "=== CEK ISI FOLDER ARTICLE ==="
                mkdir -p blog/article/
                ls -la blog/article/
                
                # 2. Setup Git
                git config user.name "github-actions"
                git config user.email "actions@github.com"
                
                # 3. Force Add (-f) untuk menerobos jika terhalang .gitignore
                git add -f blog.html
                git add -f blog/article/*
                
                # 4. Commit dan Push
                git commit -m "Auto-generate blog and article pages" || echo "No changes to commit"
                git push
