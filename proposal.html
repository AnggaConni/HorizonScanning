        const callAI = async (prompt, systemContext, apiKeys) => {
            let lastError = new Error("No valid API Key.");

            if (apiKeys.gemini) {
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${apiKeys.gemini}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemContext }] }
                        })
                    });
                    if (!res.ok) throw new Error("Gemini API Error");
                    const data = await res.json();
                    return data.candidates[0].content.parts[0].text;
                } catch (err) {
                    console.warn("Gemini Failed, trying fallback...", err);
                    lastError = err;
                }
            }
            
            if (apiKeys.claude) {
                try {
                    const res = await fetch('https://api.anthropic.com/v1/messages', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'x-api-key': apiKeys.claude,
                            'anthropic-version': '2023-06-01',
                            'anthropic-dangerously-allow-browser': 'true'
                        },
                        body: JSON.stringify({
                            model: 'claude-3-opus-20240229',
                            max_tokens: 4000,
                            system: systemContext,
                            messages: [{ role: 'user', content: prompt }]
                        })
                    });
                    if (!res.ok) throw new Error("Claude API Error (CORS).");
                    const data = await res.json();
                    return data.content[0].text;
                } catch (err) {
                    console.warn("Claude Failed, trying fallback...", err);
                    lastError = err;
                }
            } 
            
            if (apiKeys.openai) {
                try {
                    const res = await fetch('https://api.openai.com/v1/chat/completions', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKeys.openai}`
                        },
                        body: JSON.stringify({
                            model: 'gpt-4o',
                            messages: [
                                { role: 'system', content: systemContext },
                                { role: 'user', content: prompt }
                            ]
                        })
                    });
                    if (!res.ok) throw new Error("OpenAI API Error");
                    const data = await res.json();
                    return data.choices[0].message.content;
                } catch (err) {
                    console.warn("OpenAI Failed...", err);
                    lastError = err;
                }
            }
            throw lastError;
        };

            };

            const handleExportDocx = () => {
                const header = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Export HTML to Word</title><style>body { font-family: 'Calibri', sans-serif; color: #333; } h1 { text-align: center; color: #1e3a8a; } h2 { color: #2563eb; border-bottom: 1px solid #ccc; padding-bottom: 5px; margin-top: 30px;} table { border-collapse: collapse; width: 100%; margin-top: 10px; } th, td { border: 1px solid #ccc; padding: 8px; text-align: left; } th { background-color: #f1f5f9; } .cover { text-align: center; margin-top: 100px; margin-bottom: 100px; page-break-after: always; } .framework-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; background: #f8fafc; }</style></head><body>`;
                const footer = "</body></html>";
                
                let htmlContent = `<div class="cover">
                    <h1 style="font-size: 36px;">${data.cover.title}</h1>
                    <h2 style="font-size: 24px; border:none; color: #333;">${data.cover.subtitle}</h2><br><br><br>
                    <p><strong>${txt.author}:</strong><br>${data.cover.author}</p>
                    <p><strong>${txt.target}:</strong><br>${data.cover.target}</p><br><br>
                    <p>${data.cover.date}</p>
                </div>`;

                data.sections.forEach(sec => {
                    htmlContent += `<h2>${sec.title}</h2>`;
                    if (sec.type === 'richtext') htmlContent += `<div>${sec.content}</div>`;
                    else if (sec.type === 'rab') {
                        htmlContent += `<table><thead><tr><th>${txt.no}</th><th>${txt.item}</th><th>${txt.qty}</th><th>${txt.unit}</th><th>${txt.price}</th><th>${txt.total}</th></tr></thead><tbody>`;
                        let total = 0;
                        sec.rows.forEach((row, i) => {
                            let rowTotal = row.qty * row.harga;
                            total += rowTotal;
                            htmlContent += `<tr><td>${i+1}</td><td>${row.uraian}</td><td>${row.qty}</td><td>${row.unit}</td><td>${row.harga}</td><td>${rowTotal}</td></tr>`;
                        });
                        htmlContent += `</tbody><tfoot><tr><td colspan="5" style="text-align:right"><strong>${txt.grandTotal}</strong></td><td><strong>${total}</strong></td></tr></tfoot></table>`;
                    } else if (sec.type === 'framework') {
                        sec.nodes.forEach((n, i) => {
                            htmlContent += `<div class="framework-card"><strong>Phase ${i+1}: ${n.title}</strong><p>${n.description}</p></div>`;
                        });
                    }
                });

                const blob = new Blob(['\ufeff', header + htmlContent + footer], { type: 'application/msword' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = 'Proposal_Project.doc';
                a.click();
            };

            const activeSection = activeTab === 'cover' ? null : data.sections.find(s => s.id === activeTab);

            return (
                <div className="min-h-screen flex flex-col h-screen">
                    {/* HEADER */}
                    <header className="bg-white border-b border-slate-200 px-6 py-3 flex justify-between items-center shadow-sm z-20 print-hide">
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 text-blue-600 font-bold text-xl">
                                <i className="fas fa-columns"></i> {txt.appTitle} <span className="text-slate-400 font-normal text-sm ml-1">AI PRO</span>
                            </div>
                            <div className={`text-xs font-medium px-2 py-1 rounded-full border ${activeModelsList.length > 0 ? 'bg-green-50 text-green-600 border-green-200' : 'bg-slate-100 text-slate-500 border-slate-200'}`}>
                                {activeModelsList.length > 0 ? <span><i className="fas fa-check-circle mr-1"></i> {activeModel}</span> : txt.aiInactive}
                            </div>
                        </div>

                        <div className="flex items-center gap-2">
                            {/* Lang Toggle */}
                            <button onClick={toggleLanguage} className="flex items-center bg-slate-100 rounded-lg p-1 mr-2 border border-slate-200">
                                <span className={`text-xs font-bold px-3 py-1.5 rounded-md transition ${lang === 'en' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}`}>EN</span>
                                <span className={`text-xs font-bold px-3 py-1.5 rounded-md transition ${lang === 'id' ? 'bg-white shadow-sm text-blue-600' : 'text-slate-400'}`}>ID</span>
                            </button>

                            <button onClick={() => setShowSettings(!showSettings)} className="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition">
                                <i className="fas fa-cog text-lg"></i>
                            </button>
                            <div className="w-px h-6 bg-slate-300 mx-1"></div>
                            
                            <button onClick={handleLoadSample} className="flex items-center gap-2 px-3 py-2 bg-green-100 hover:bg-green-200 text-green-700 rounded-lg text-sm font-medium transition border border-green-200">
                                <i className="fas fa-magic"></i> {txt.loadSample}
                            </button>

                            <label className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-medium cursor-pointer transition">
                                <i className="fas fa-folder-open"></i> {txt.load}
                                <input type="file" accept=".json" className="hidden" onChange={handleLoadJson} />
                            </label>
                            <button onClick={handleSaveJson} className="flex items-center gap-2 px-3 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg text-sm font-medium transition">
                                <i className="fas fa-save"></i> {txt.save}
                            </button>
                            
                            <div className="w-px h-6 bg-slate-300 mx-1"></div>

                            <button onClick={() => window.print()} className="flex items-center gap-2 px-3 py-2 bg-slate-800 hover:bg-slate-700 text-white rounded-lg text-sm font-medium transition shadow-sm">
                                <i className="fas fa-print"></i> {txt.pdf}
                            </button>
                            <button onClick={handleExportDocx} className="flex items-center gap-2 px-3 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition shadow-sm">
                                <i className="fas fa-file-word"></i> {txt.docx}
                            </button>
                        </div>

                        {/* AI SETTINGS */}
                        {showSettings && (
                            <div className="absolute top-14 right-6 w-80 bg-white border border-slate-200 shadow-xl rounded-xl p-5 z-50">
                                <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2"><i className="fas fa-key"></i> {txt.settingsTitle}</h3>
                                <p className="text-xs text-slate-500 mb-4">{txt.settingsDesc}</p>
                                <div className="space-y-3">
                                    <div><label className="block text-xs font-bold text-slate-600 mb-1">Google Gemini API Key</label><input type="password" value={data.apiKeys.gemini} onChange={e => updateApiKey('gemini', e.target.value)} className="w-full p-2 text-sm border rounded focus:border-blue-500 outline-none" placeholder="AIzaSy..." /></div>
                                    <div><label className="block text-xs font-bold text-slate-600 mb-1">Anthropic Claude API Key</label><input type="password" value={data.apiKeys.claude} onChange={e => updateApiKey('claude', e.target.value)} className="w-full p-2 text-sm border rounded focus:border-blue-500 outline-none" placeholder="sk-ant-..." /></div>
                                    <div><label className="block text-xs font-bold text-slate-600 mb-1">OpenAI API Key</label><input type="password" value={data.apiKeys.openai} onChange={e => updateApiKey('openai', e.target.value)} className="w-full p-2 text-sm border rounded focus:border-blue-500 outline-none" placeholder="sk-..." /></div>
                                </div>
                                <button onClick={() => setShowSettings(false)} className="w-full mt-4 py-2 bg-blue-50 text-blue-600 font-bold text-sm rounded-lg hover:bg-blue-100">{txt.close}</button>
                            </div>
                        )}
                    </header>

                    <div className="flex flex-1 overflow-hidden print-hide">
                        {/* SIDEBAR */}
                        <aside className="w-64 bg-slate-50 border-r border-slate-200 flex flex-col">
                            <div className="p-4 flex-1 overflow-y-auto space-y-1">
                                <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-3 px-3">{txt.navDoc}</div>
                                <button onClick={() => setActiveTab('cover')} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'cover' ? 'bg-blue-100 text-blue-700' : 'text-slate-600 hover:bg-slate-200/50'}`}>
                                    <i className="fas fa-columns w-4"></i> {txt.coverPage}
                                </button>
                                {data.sections.map(sec => (
                                    <button key={sec.id} onClick={() => setActiveTab(sec.id)} className={`w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-sm font-medium transition-colors text-left ${activeTab === sec.id ? 'bg-blue-100 text-blue-700' : 'text-slate-600 hover:bg-slate-200/50'}`}>
                                        <div className="flex items-center gap-3 overflow-hidden">
                                            {sec.type === 'richtext' && <i className="fas fa-align-left text-slate-400 w-4"></i>}
                                            {sec.type === 'rab' && <i className="fas fa-calculator text-green-500 w-4"></i>}
                                            {sec.type === 'framework' && <i className="fas fa-layer-group text-purple-500 w-4"></i>}
                                            <span className="truncate">{sec.title}</span>
                                        </div>
                                        {loadingSection === sec.id && <i className="fas fa-spinner fa-spin text-purple-500 shrink-0"></i>}
                                    </button>
                                ))}
                            </div>
                            <div className="p-4 border-t border-slate-200 bg-white">
                                <button onClick={handleReviseAll} disabled={isRevisingAll || activeModel === txt.aiInactive} className={`w-full flex items-center justify-center gap-2 py-3 rounded-xl font-bold text-sm shadow-sm transition-all ${isRevisingAll ? 'bg-purple-100 text-purple-400 cursor-not-allowed' : activeModel === txt.aiInactive ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white'}`}>
                                    {isRevisingAll ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-magic"></i>}
                                    {isRevisingAll ? txt.processing : txt.reviseAll}
                                </button>
                                {aiStatusMsg && <p className="text-xs text-center mt-2 text-purple-600 font-medium animate-pulse">{aiStatusMsg}</p>}
                            </div>
                        </aside>

                        {/* EDITOR */}
                        <main className="flex-1 overflow-y-auto p-8 bg-slate-100">
                            <div className="max-w-4xl mx-auto space-y-6 pb-20">
                                {activeTab === 'cover' && (
                                    <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                                        <h2 className="text-2xl font-bold mb-6 text-slate-800 flex items-center gap-2"><i className="fas fa-columns"></i> {txt.setupCover}</h2>
                                        <div className="space-y-4">
                                            <div><label className="block text-sm font-bold text-slate-600 mb-1">{txt.docTitle}</label><input type="text" className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={data.cover.title} onChange={e => updateCover('title', e.target.value)} /></div>
                                            <div><label className="block text-sm font-bold text-slate-600 mb-1">{txt.subTitle}</label><input type="text" className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={data.cover.subtitle} onChange={e => updateCover('subtitle', e.target.value)} /></div>
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className="block text-sm font-bold text-slate-600 mb-1">{txt.author}</label><input type="text" className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={data.cover.author} onChange={e => updateCover('author', e.target.value)} /></div>
                                                <div><label className="block text-sm font-bold text-slate-600 mb-1">{txt.target}</label><input type="text" className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={data.cover.target} onChange={e => updateCover('target', e.target.value)} /></div>
                                            </div>
                                            <div><label className="block text-sm font-bold text-slate-600 mb-1">{txt.date}</label><input type="text" className="w-full p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" value={data.cover.date} onChange={e => updateCover('date', e.target.value)} /></div>
                                        </div>
                                    </div>
                                )}

                                {activeSection && (
                                    <div className="animate-in fade-in duration-300">
                                        <div className="flex items-start justify-between mb-4">
                                            <div>
                                                <h2 className="text-2xl font-bold text-slate-800">{activeSection.title}</h2>
                                                <p className="text-slate-500 text-sm mt-1">
                                                    {activeSection.type === 'richtext' ? txt.useEditor : activeSection.type === 'rab' ? txt.fillTable : txt.addCards}
                                                </p>
                                            </div>
                                            <button onClick={() => handleReviseSection(activeSection.id)} disabled={loadingSection === activeSection.id || activeModel === txt.aiInactive} className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition ${loadingSection === activeSection.id ? 'bg-purple-100 text-purple-400 cursor-not-allowed' : activeModel === txt.aiInactive ? 'bg-slate-200 text-slate-400 cursor-not-allowed' : 'bg-purple-100 text-purple-700 hover:bg-purple-200 hover:text-purple-800 border border-purple-200'}`}>
                                                {loadingSection === activeSection.id ? <i className="fas fa-spinner fa-spin"></i> : <i className="fas fa-magic"></i>}
                                                {loadingSection === activeSection.id ? txt.aiThinking : txt.aiAssist}
                                            </button>
                                        </div>

                                        {activeModel === txt.aiInactive && (
                                            <div className="mb-4 p-3 bg-yellow-50 text-yellow-700 text-sm rounded-lg border border-yellow-200 flex items-center gap-2">
                                                <i className="fas fa-exclamation-circle"></i> {txt.aiDisabledInfo}
                                            </div>
                                        )}

                                        {activeSection.type === 'richtext' && <MiniRichText content={activeSection.content} onChange={(content) => updateSection(activeSection.id, { content })} isAiLoading={loadingSection === activeSection.id} />}
                                        {activeSection.type === 'rab' && <RabEditor data={activeSection.rows} onChange={(rows) => updateSection(activeSection.id, { rows })} isAiLoading={loadingSection === activeSection.id} txt={txt} />}
                                        {activeSection.type === 'framework' && <FrameworkEditor nodes={activeSection.nodes} onChange={(nodes) => updateSection(activeSection.id, { nodes })} isAiLoading={loadingSection === activeSection.id} txt={txt} />}
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {/* PRINT LAYOUT */}
                    <div className="hidden print:block bg-white text-black text-sm max-w-4xl mx-auto p-8">
                        <div className="h-screen flex flex-col justify-center items-center text-center page-break-after-always">
                            <h1 className="text-4xl font-bold uppercase tracking-widest mb-4">{data.cover.title}</h1>
                            <h2 className="text-2xl text-slate-600 mb-16">{data.cover.subtitle}</h2>
                            <div className="mb-8"><p className="font-bold text-slate-500">{txt.author}:</p><p className="text-xl font-bold">{data.cover.author}</p></div>
                            <div className="mb-16"><p className="font-bold text-slate-500">{txt.target}:</p><p className="text-xl font-bold">{data.cover.target}</p></div>
                            <p className="text-slate-500">{data.cover.date}</p>
                        </div>
                        {data.sections.map((sec, idx) => (
                            <div key={idx} className="mb-10 page-break-inside-avoid">
                                <h3 className="text-xl font-bold border-b-2 border-slate-800 pb-2 mb-4 text-blue-900">{sec.title}</h3>
                                {sec.type === 'richtext' && <div className="prose max-w-none text-justify print:prose-p:my-2 print:prose-h3:text-lg" dangerouslySetInnerHTML={{ __html: sec.content }} />}
                                {sec.type === 'rab' && (
                                    <table className="w-full border-collapse mt-4">
                                        <thead>
                                            <tr className="bg-slate-200">
                                                <th className="border border-slate-400 p-2 text-center w-10">{txt.no}</th>
                                                <th className="border border-slate-400 p-2">{txt.item}</th>
                                                <th className="border border-slate-400 p-2 text-center">{txt.qty}</th>
                                                <th className="border border-slate-400 p-2 text-center">{txt.unit}</th>
                                                <th className="border border-slate-400 p-2 text-right">{txt.price}</th>
                                                <th className="border border-slate-400 p-2 text-right">{txt.total}</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {sec.rows.map((r, i) => (
                                                <tr key={r.id}>
                                                    <td className="border border-slate-400 p-2 text-center">{i+1}</td>
                                                    <td className="border border-slate-400 p-2">{r.uraian}</td>
                                                    <td className="border border-slate-400 p-2 text-center">{r.qty}</td>
                                                    <td className="border border-slate-400 p-2 text-center">{r.unit}</td>
                                                    <td className="border border-slate-400 p-2 text-right">{r.harga.toLocaleString()}</td>
                                                    <td className="border border-slate-400 p-2 text-right">{(r.qty * r.harga).toLocaleString()}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot>
                                            <tr className="bg-slate-100 font-bold">
                                                <td colSpan="5" className="border border-slate-400 p-2 text-right">{txt.grandTotal}</td>
                                                <td className="border border-slate-400 p-2 text-right text-blue-800">
                                                    {sec.rows.reduce((sum, r) => sum + (r.qty*r.harga), 0).toLocaleString()}
                                                </td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                )}
                                {sec.type === 'framework' && (
                                    <div className="flex flex-col gap-4 mt-4">
                                        {sec.nodes.map((n, i) => (
                                            <div key={n.id} className="border border-slate-300 p-4 rounded bg-slate-50 flex gap-4">
                                                <div className="font-bold text-xl text-blue-800 w-8">{i+1}.</div>
                                                <div><h4 className="font-bold text-lg mb-1">{n.title}</h4><p className="text-slate-700">{n.description}</p></div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
